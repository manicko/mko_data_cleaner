{
  'data_paths': {
     'import_folder': 'raw_data',
    'export_folder': 'clean_data',
    'dict_file': 'dict/merged_dictionary.csv',
    'db_file': 'data_base/db_example.db'
  },
  'data_file_settings': {
    'extension': 'gz', # data files'  extension
    'search_cols': [ 2, 3, 4, 5, 6, 7, 8, 9 ]
  },
  'dict_file_settings': {
    'extension': 'csv',
    'actions': { # columns' indexes in the file_search containing settings
      'action': 0,  # update or delete setting
      'term': 3  # search string used after match setting in the SQL query
    },
    clean_cols_ids: { # indexes of columns containing output values
      'cat': 4,
      'adv': 5,
      'bra': 6,
      'sbr': 7,
      'mdl': 8,
      'cln_0': 9,
      'cln_1': 10,
      'cln_2': 11,
      'cln_3': 12,
      'cln_4': 13,
      'cln_5': 14
    }
  },
  'database_settings': {
    table_name: 'data_table'
  },
  'read_settings': { # general settings for pandas CSV reader
    'from_csv': {
      'sep': ';',
      'on_bad_lines': 'skip',
      'encoding': 'utf-8',
      'index_col': False,
      'skiprows': Null,
      'decimal': ',',
      'header': 0  # ignor column names in CSV file
    }
  },
  'export_settings': {
    'to_csv': { # general settings for pandas CSV reader
      'chunksize': 10000,
      'decimal': ',',
      'sep': ';',
      'encoding': 'utf-8-sig',
      'mode': 'a',
      'header': True,
      'index': False,
      'compression': 'gzip'
    }
  }
}