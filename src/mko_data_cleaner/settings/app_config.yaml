{
  'data_paths': {
    'import_folder': 'raw_data',
    'export_folder': 'clean_data',
    'dict_file': 'dict/merged_dictionary.csv',
    'db_file': 'data_base/db_example.db'
  },
  'data_file_settings': {
    'extension': 'gz', # data files'  extension
    'search_cols': [ 2, 3, 4, 5, 6, 7, 8, 9 ] # TODO: Depricated
  },
  'dict_file_settings': {
    'extension': 'csv',
    'col_indexes': { # columns' indexes in the file_search containing settings
      'action': 0,  # update or delete setting
      'match': 1,
      'search': 2,
      'term': 3  # search string used after match setting in the SQL query
    },
  }
},
'database_settings': {
  'table_name': 'data_table'
},
'read_settings': { # general settings for pandas CSV reader
  'from_csv': {
    'sep': ';',
    'on_bad_lines': 'skip',
    'encoding': 'utf-8',
    'index_col': False,
    'skiprows': null,
    'decimal': ',',
    'header': 0  # ignor column names in CSV file
  }
},
'export_settings': {
  'to_csv': { # general settings for pandas CSV reader
    'chunksize': 10000,
    'decimal': ',',
    'sep': ';',
    'encoding': 'utf-8-sig',
    'mode': 'a',
    'header': True,
    'index': False,
    'compression': 'gzip'
  }
}
}